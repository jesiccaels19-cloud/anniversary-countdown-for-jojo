<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Special Countdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="countdown-container">
        <div class="hearts">✨ 💕 ✨</div>
        <h1 class="title">Countdown until our anniversary date</h1>
        
        <div class="timer-box">
            <div class="time-segment">
                <span id="days" class="number">00</span>
                <span class="label">Days</span>
            </div>
            <div class="time-segment">
                <span id="hours" class="number">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="time-segment">
                <span id="minutes" class="number">00</span>
                <span class="label">Mins</span>
            </div>
            <div class="time-segment">
                <span id="seconds" class="number">00</span>
                <span class="label">Secs</span>
            </div>
        </div>
        
        <p class="footer-text">can't wait to celebrate another year with you! 🥰</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
